<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TecnoLink — Iniciar Sesión</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="container">
    <div class="card">
   <img src="imgs/logo2.2.jfif" alt="TecnoLink" class="logo">
      <form id="loginForm">
        <div class="campo">
          <label for="nombre">Nombre de usuario</label>
          <input type="text" id="nombre" placeholder="Tu nombre de usuario" required>
          <span class="error" id="errorNombre"></span>
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Tu contraseña" required>
          <span class="error" id="errorPassword"></span>
        </div>
        <button type="submit">Iniciar Sesión</button>
        <p class="registro">¿No tenés cuenta? <a href="#">Registrate</a></p>
      </form>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
